name: Render CD

on:
  workflow_run:
    workflows:
      - Airflow CI
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-to-render:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render sync or deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_SYNC_HOOK_URL: ${{ secrets.RENDER_SYNC_HOOK_URL }}
        run: |
          HOOK_URL="${RENDER_SYNC_HOOK_URL:-${RENDER_DEPLOY_HOOK_URL:-}}"

          if [ -z "${HOOK_URL:-}" ]; then
            echo "Missing repository secret: RENDER_SYNC_HOOK_URL or RENDER_DEPLOY_HOOK_URL" >&2
            exit 1
          fi

          curl -fsS -X POST "$HOOK_URL"
