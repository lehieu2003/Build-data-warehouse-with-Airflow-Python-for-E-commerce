name: ETL Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  run-etl-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create GitHub Actions .env file
        run: |
          cat > .env <<'EOF'
          AIRFLOW_UID=50000
          AIRFLOW_GID=0
          MYSQL_DATABASE=metastore_db
          MYSQL_ROOT_USER=root
          MYSQL_ROOT_PASSWORD=admin
          MYSQL_USER=admin
          MYSQL_PASSWORD=admin
          MYSQL_HOST=mysql
          MYSQL_PORT=3306
          MYSQL_DATABASES=olist
          POSTGRES_HOST=de_psql
          POSTGRES_PORT=5432
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=admin
          POSTGRES_DB=postgres
          POSTGRES_HOST_AUTH_METHOD=trust
          EOF

      - name: Prepare mounted directories for Airflow
        run: |
          mkdir -p logs config plugins
          chmod -R 777 logs config plugins

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for Airflow webserver and scheduler
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health > /tmp/airflow-health.json; then
              cat /tmp/airflow-health.json
              python - <<'PY'
import json
with open("/tmp/airflow-health.json", "r", encoding="utf-8") as f:
    data = json.load(f)
web_ok = data.get("metadatabase", {}).get("status") == "healthy"
scheduler_ok = data.get("scheduler", {}).get("status") == "healthy"
if web_ok and scheduler_ok:
    raise SystemExit(0)
raise SystemExit(1)
PY
              if [ $? -eq 0 ]; then
                exit 0
              fi
            fi
            sleep 10
          done
          docker compose logs airflow-webserver
          docker compose logs airflow-scheduler
          exit 1

      - name: Prepare source and warehouse databases
        run: |
          docker exec mysql mysql -uroot -padmin -e "SET GLOBAL local_infile=1;"
          docker exec mysql mysql --local-infile=1 -uadmin -padmin olist -e "source /tmp/load_dataset/olist.sql"
          docker exec mysql mysql --local-infile=1 -uadmin -padmin olist -e "source /tmp/load_dataset/load_data.sql"
          docker exec de_psql psql -U admin -d postgres -c "CREATE SCHEMA IF NOT EXISTS staging; CREATE SCHEMA IF NOT EXISTS warehouse; CREATE SCHEMA IF NOT EXISTS mart;"

      - name: Configure Airflow connections
        run: |
          docker compose run --rm airflow-cli connections delete mysql || true
          docker compose run --rm airflow-cli connections delete postgres || true
          docker compose run --rm airflow-cli connections add mysql --conn-type mysql --conn-host mysql --conn-login admin --conn-password admin --conn-schema olist --conn-port 3306
          docker compose run --rm airflow-cli connections add postgres --conn-type postgres --conn-host de_psql --conn-login admin --conn-password admin --conn-schema postgres --conn-port 5432

      - name: Unpause DAG
        run: docker compose run --rm airflow-cli dags unpause e_commerce_dw_etl

      - name: Trigger DAG run
        run: |
          LOGICAL_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          DAG_RUN_ID="github-actions-${GITHUB_RUN_ID}"
          curl -fsS -u airflow:airflow \
            -H "Content-Type: application/json" \
            -X POST "http://localhost:8080/api/v1/dags/e_commerce_dw_etl/dagRuns" \
            -d "{\"dag_run_id\":\"${DAG_RUN_ID}\",\"logical_date\":\"${LOGICAL_DATE}\"}"
          echo "DAG_RUN_ID=${DAG_RUN_ID}" >> "$GITHUB_ENV"

      - name: Wait for DAG success
        run: |
          for i in {1..60}; do
            STATE="$(curl -fsS -u airflow:airflow "http://localhost:8080/api/v1/dags/e_commerce_dw_etl/dagRuns/${DAG_RUN_ID}" | python -c "import sys, json; print(json.load(sys.stdin)['state'])")"
            echo "Current DAG state: ${STATE}"
            if [ "${STATE}" = "success" ]; then
              exit 0
            fi
            if [ "${STATE}" = "failed" ]; then
              docker compose logs airflow-scheduler
              docker compose logs airflow-webserver
              exit 1
            fi
            sleep 20
          done
          docker compose logs airflow-scheduler
          exit 1

      - name: Verify mart tables contain data
        run: |
          docker exec de_psql psql -U admin -d postgres -c "SELECT COUNT(*) AS fact_orders_count FROM warehouse.fact_orders;"
          docker exec de_psql psql -U admin -d postgres -c "SELECT COUNT(*) AS mart_sales_daily_count FROM mart.mart_sales_daily;"
          docker exec de_psql psql -U admin -d postgres -c "SELECT COUNT(*) AS mart_product_performance_count FROM mart.mart_product_performance;"
          docker exec de_psql psql -U admin -d postgres -c "SELECT COUNT(*) AS mart_city_revenue_count FROM mart.mart_city_revenue;"

      - name: Print docker compose status
        if: always()
        run: docker compose ps

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Shut down services
        if: always()
        run: docker compose down -v
