name: Airflow CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-airflow-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create CI .env file
        run: |
          cat > .env <<'EOF'
          AIRFLOW_UID=50000
          AIRFLOW_GID=0
          MYSQL_DATABASE=metastore_db
          MYSQL_ROOT_USER=root
          MYSQL_ROOT_PASSWORD=admin
          MYSQL_USER=admin
          MYSQL_PASSWORD=admin
          MYSQL_HOST=mysql
          MYSQL_PORT=3306
          MYSQL_DATABASES=olist
          POSTGRES_HOST=de_psql
          POSTGRES_PORT=5432
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=admin
          POSTGRES_DB=postgres
          POSTGRES_HOST_AUTH_METHOD=trust
          EOF

      - name: Validate Docker Compose file
        run: docker compose config --quiet

      - name: Prepare mounted directories for Airflow
        run: |
          mkdir -p logs config plugins
          chmod -R 777 logs config plugins

      - name: Build Airflow image
        run: docker compose build

      - name: Start Airflow metadata database
        run: docker compose up -d postgres

      - name: Initialize Airflow metadata
        run: docker compose up airflow-init --abort-on-container-exit --exit-code-from airflow-init

      - name: Verify DAG can be parsed
        run: docker compose run --rm airflow-cli dags list
